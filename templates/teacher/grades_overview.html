{% extends 'base.html' %} {% block title %}Grades Overview{% endblock %} {% block content %}
<div class="container-fluid">
  <div class="page-header">
    <div class="row align-items-center">
      <div class="col">
        <h2><i class="bi bi-table me-2"></i>Grades Overview</h2>
        <p class="text-muted">Search, filter, and edit grades for all your subjects in real-time.</p>
      </div>
      <div class="col-auto">
        <a href="{{ url_for('teacher.grades') }}" class="btn btn-outline-secondary">
          <i class="bi bi-arrow-left me-1"></i>Back to Groups
        </a>
      </div>
    </div>
  </div>

  <div class="card mb-4 shadow-sm border-0">
    <div class="card-header bg-navy text-white">
      <i class="bi bi-funnel-fill me-2"></i><strong>Select Subject to Load Grades</strong>
    </div>
    <div class="card-body">
      <div class="row g-3">
        <div class="col-12 col-md-3">
          <label class="form-label text-muted small">Subject</label>
          <select id="filterSubject" class="form-select form-select-sm">
            <option value="">-- Choose a Subject --</option>
            {% for sub in filters.subjects %}
            <option value="{{ sub }}">{{ sub }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-12 col-md-3 subject-filters d-none">
          <label class="form-label text-muted small">Class</label>
          <select id="filterClass" class="form-select form-select-sm">
            <option value="all">All Classes</option>
          </select>
        </div>
        <div class="col-12 col-md-3 subject-filters d-none">
          <label class="form-label text-muted small">Student Name</label>
          <input type="text" id="searchName" class="form-control form-control-sm" placeholder="Type name...">
        </div>
        <div class="col-12 col-md-3 subject-filters d-none">
          <label class="form-label text-muted small">Grade Components</label>
          <select id="filterComponent" class="form-select form-select-sm">
            <option value="all">All Components</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <div id="noSubjectSelectedMessage" class="text-center py-5 text-muted">
    <i class="bi bi-arrow-up-circle fs-1"></i>
    <h5 class="mt-3">Please select a subject to load the grades table</h5>
  </div>

  <div class="card shadow-sm border-0 d-none" id="tableCard">
    <div class="card-body p-0 table-responsive">
      <table class="table table-hover table-bordered table-sm align-middle mb-0 text-center" id="overviewTable" style="white-space: nowrap;">
        <thead class="table-light align-middle" id="tableHead">
          <!-- Dynamically generated headers -->
        </thead>
        <tbody id="tableBody">
          <!-- Dynamically generated rows -->
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
// Pass backend payload to frontend variables safely
const allStudents = {{ students | tojson }};
const subjectComponents = {{ subject_components | tojson }};

document.addEventListener('DOMContentLoaded', () => {
    const filterSubject = document.getElementById('filterSubject');
    const filterClass = document.getElementById('filterClass');
    const searchName = document.getElementById('searchName');
    const filterComponent = document.getElementById('filterComponent');
    const tableCard = document.getElementById('tableCard');
    const tableHead = document.getElementById('tableHead');
    const tableBody = document.getElementById('tableBody');
    const noSubjectSelectedMessage = document.getElementById('noSubjectSelectedMessage');
    const secondaryFilters = document.querySelectorAll('.subject-filters');

    function renderTable() {
        const sub = filterSubject.value;
        
        if (!sub) {
            tableCard.classList.add('d-none');
            noSubjectSelectedMessage.classList.remove('d-none');
            secondaryFilters.forEach(el => el.classList.add('d-none'));
            return;
        }

        tableCard.classList.remove('d-none');
        noSubjectSelectedMessage.classList.add('d-none');
        secondaryFilters.forEach(el => el.classList.remove('d-none'));

        const query = searchName.value.toLowerCase().trim();
        const compFilter = filterComponent.value;
        const classFilter = filterClass.value;

        // Find students specific to selected subject
        let filteredStudents = allStudents.filter(s => s.subject_name === sub);
        
        // Dynamically build class dropdown based on this subject's students
        const allAssociatedClasses = [...new Set(filteredStudents.map(s => s.class_name))].sort();
        const currentClassOptions = Array.from(filterClass.options).map(opt => opt.value);
        const expectedClassOptions = ['all', ...allAssociatedClasses];
        
        if (JSON.stringify(currentClassOptions) !== JSON.stringify(expectedClassOptions)) {
            let html = '<option value="all">All Classes</option>';
            allAssociatedClasses.forEach(cls => {
                html += `<option value="${cls}">${cls}</option>`;
            });
            const oldVal = filterClass.value;
            filterClass.innerHTML = html;
            if (expectedClassOptions.includes(oldVal)) {
                filterClass.value = oldVal;
            } else {
                filterClass.value = 'all'; // reset if old selected class isn't in this subject
            }
        }
        
        // Apply Filters
        if (filterClass.value !== 'all') {
             filteredStudents = filteredStudents.filter(s => s.class_name === filterClass.value);
        }

        if (query) {
            filteredStudents = filteredStudents.filter(s => 
                s.student_name.toLowerCase().includes(query)
            );
        }

        // Get components for this subject
        // We just use the first matching student to get subject_id from our data structure, or fallback if empty
        const sampleStudent = allStudents.find(s => s.subject_name === sub);
        if (!sampleStudent) {
            tableBody.innerHTML = '<tr><td colspan="100%" class="py-4">No students found.</td></tr>';
            return;
        }

        const subId = String(sampleStudent.subject_id);
        let comps = subjectComponents[subId] || [];

        // Build component filter dropdown if it's not set for this subject yet
        // Check if options correspond to current subject
        const currentOptions = Array.from(filterComponent.options).map(opt => opt.value);
        const expectedOptions = ['all', ...comps.map(c => String(c.id))];
        
        if (JSON.stringify(currentOptions) !== JSON.stringify(expectedOptions)) {
            let html = '<option value="all">All Components</option>';
            comps.forEach(c => {
                html += `<option value="${c.id}">${c.name}</option>`;
            });
            const oldVal = filterComponent.value;
            filterComponent.innerHTML = html;
            if (expectedOptions.includes(oldVal)) {
                filterComponent.value = oldVal;
            }
        }

        if (compFilter !== 'all') {
            comps = comps.filter(c => String(c.id) === compFilter);
        }

        // Render Head
        let theadHtml = `
          <tr>
            <th class="text-start px-3" style="min-width: 200px;">Student Name</th>
            <th style="min-width: 120px;">Class</th>
            ${comps.map(c => `<th><div class="text-truncate" style="max-width: 150px; min-width: 90px;" title="${c.name}">${c.name}</div><div class="small text-muted fw-normal">Max: ${c.max_score}</div></th>`).join('')}
          </tr>
        `;
        tableHead.innerHTML = theadHtml;

        // Render Body
        let tbodyHtml = '';
        if (filteredStudents.length === 0) {
            tbodyHtml = `<tr><td colspan="${2 + comps.length}" class="py-4 text-muted">No students match your filter.</td></tr>`;
        } else {
            filteredStudents.forEach(st => {
                // Strip "Year X - Sem Y - Section Z - Morning" out of class string to just show Class
                // but the class dropdown should still filter exactly. We'll just display short class name if needed.
                // Wait, st.class_name IS the exact string. We'll keep st.class_name as requested.
                tbodyHtml += `
                  <tr>
                    <td class="text-start px-3">
                      <strong>${st.student_name}</strong><br>
                      <small class="text-muted"><i class="bi bi-person-badge"></i> ${st.student_number || '-'}</small>
                    </td>
                    <td><span class="badge bg-secondary text-wrap" style="max-width: 150px;">${st.class_name.split(' - ')[0]} ${st.class_name.split(' - ').length > 2 ? '- ' + st.class_name.split(' - ')[2] : ''}</span></td>
                `;

                // Columns for grades
                comps.forEach(c => {
                    const compData = st.components[String(c.id)];
                    const score = (compData && compData.score !== null && compData.score !== undefined) ? compData.score : '';
                    tbodyHtml += `
                      <td style="min-width: 100px;">
                        <input 
                            type="number" 
                            class="form-control text-center form-control-sm mx-auto" 
                            style="font-size: 0.85rem; font-weight: bold; color: #1C0770; max-width: 90px;"
                            data-student-id="${st.student_id}"
                            data-subject-id="${st.subject_id}"
                            data-component-id="${c.id}"
                            max="${c.max_score}"
                            min="0"
                            step="0.25"
                            value="${score}"
                            onchange="saveGrade(this)"
                        />
                      </td>
                    `;
                });
                
                tbodyHtml += `</tr>`;
            });
        }
        
        tableBody.innerHTML = tbodyHtml;
    }

    filterSubject.addEventListener('change', () => { filterClass.value = 'all'; filterComponent.value = 'all'; renderTable(); });
    filterClass.addEventListener('change', renderTable);
    searchName.addEventListener('input', renderTable);
    filterComponent.addEventListener('change', renderTable);
    
    // Initial setup
    renderTable();
});

async function saveGrade(input) {
    const studentId = input.getAttribute('data-student-id');
    const subjectId = input.getAttribute('data-subject-id');
    const componentId = input.getAttribute('data-component-id');
    let val = input.value.trim();
    const maxScore = parseFloat(input.getAttribute('max'));
    
    if (val !== '') {
        val = parseFloat(val);
        if (isNaN(val) || val < 0 || val > maxScore) {
            alert(`Invalid score. Must be between 0 and ${maxScore}.`);
            input.value = '';
            input.focus();
            return;
        }
    }

    // Give visual feedback that it's saving
    input.classList.add('bg-warning');
    input.classList.remove('bg-success', 'text-white');

    try {
        const formData = new FormData();
        formData.append('student_id', studentId);
        formData.append('subject_id', subjectId);
        formData.append('component_id', componentId);
        formData.append('score', input.value.trim());

        const res = await fetch("{{ url_for('teacher.api_save_inline_grade') }}", {
            method: 'POST',
            body: formData
        });
        const data = await res.json();
        
        input.classList.remove('bg-warning');
        if (data.success) {
            input.classList.add('bg-success', 'text-white');
            setTimeout(() => input.classList.remove('bg-success', 'text-white'), 1500);
        } else {
            alert(data.message || 'Error saving score');
            input.classList.add('bg-danger', 'text-white');
        }
    } catch (e) {
        console.error(e);
        alert('Network error saving grade');
        input.classList.remove('bg-warning');
        input.classList.add('bg-danger', 'text-white');
    }
}
</script>
{% endblock %}
